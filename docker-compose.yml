services:
  # ============================================
  # Django REST API with Uvicorn
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-reservation-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,api
      - PYTHONPATH=/app
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source code only - NOT the entire directory
      - ./reservation_system:/app/reservation_system
      # Exclude virtual environment from being overridden
      - /app/.venv
    networks:
      - hotel-network
    # Run migrations and then start Uvicorn
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ============================================
  # MySQL 8.0 Database (local development)
  # ============================================
  db:
    image: mysql:8.0
    container_name: hotel-reservation-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      # Changed from 3306:3306 to 3307:3306 to avoid conflict
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hotel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Redis Cache (Optional - for caching)
  # ============================================
  # cache:
  #   image: redis:7-alpine
  #   container_name: hotel-reservation-cache
  #   networks:
  #     - hotel-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  db_data:

networks:
  hotel-network:
    driver: bridge